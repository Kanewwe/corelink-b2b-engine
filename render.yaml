services:
  - type: web
    name: corelink-b2b-engine
    env: docker
    region: oregon
    plan: free
    branch: v2.0-optimized
    dockerfilePath: Dockerfile
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: API_TOKEN
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: corelink-db
          property: internalDatabaseUrl
