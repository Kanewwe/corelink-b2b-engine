previewsEnabled: true
services:
  # 1. FastAPI 後端 (Docker Container)
  - type: web
    name: linkora-backend
    env: docker
    region: frankfurt # Render 常見的免費/擴展區之一
    dockerContext: ./backend
    dockerfilePath: ./Dockerfile
    plan: free # or starter
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linkora-postgres
          property: connectionString
      # 授權的前端網域 (Render 會自動配發 onrender.com 網域)
      - key: ALLOWED_ORIGINS
        value: "http://localhost:5173,https://linkora-frontend.onrender.com"

  # 2. React 前端 (Static Site 原生部署，速度最快且免費)
  - type: web
    name: linkora-frontend
    env: static
    region: frankfurt
    rootDir: ./frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    # 設定 SPA Fallback 與自動 Proxy API 請求到後端
    routes:
      - type: rewrite
        source: /api/*
        destination: https://linkora-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"

databases:
  # 3. PostgreSQL 資料庫
  - name: linkora-postgres
    region: frankfurt
    databaseName: linkoradb
    user: linkora
    plan: free
