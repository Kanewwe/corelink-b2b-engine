previewsEnabled: true
services:
  # 1. FastAPI 後端 (Production - Branch: prd)
  - type: web
    name: linkora-backend
    env: docker
    region: frankfurt
    branch: prd
    dockerContext: ./backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linkora-postgres
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "http://localhost:5173,https://linkora-frontend.onrender.com"

  # 2. FastAPI 後端 (UAT/Staging - Branch: uat)
  - type: web
    name: linkora-backend-uat
    env: docker
    region: frankfurt
    branch: uat
    dockerContext: ./backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linkora-postgres
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "http://localhost:5173,https://linkora-frontend-uat.onrender.com"

  # 3. React 前端 (Production - Branch: prd)
  - type: web
    name: linkora-frontend
    env: static
    region: frankfurt
    branch: prd
    rootDir: ./frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://linkora-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"

  # 4. React 前端 (UAT/Staging - Branch: uat)
  - type: web
    name: linkora-frontend-uat
    env: static
    region: frankfurt
    branch: uat
    rootDir: ./frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://linkora-backend-uat.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"

databases:
  # 5. PostgreSQL 資料庫 (由所有環境共用，或可在後續擴展為多資料庫)
  - name: linkora-postgres
    region: frankfurt
    databaseName: linkoradb
    user: linkora
    plan: free
